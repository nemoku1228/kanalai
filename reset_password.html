<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slaptažodžio atstatymas | market</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="i18n.js"></script>
<style>
:root{--navy:#0B1929;--navy2:#13233A;--bg:#F7F8FA;--accent:#FF5C35;--green:#16A34A;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;--border:#E7EAEE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
header{background:var(--navy2);padding:14px 0}
.header-inner{max-width:480px;margin:0 auto;padding:0 20px}
.logo{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;color:white}
.logo span{color:var(--accent)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:white;border-radius:16px;max-width:420px;width:100%;padding:32px;border:1px solid var(--border)}
.card-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.form-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:9px;font-size:13.5px;outline:none;margin-bottom:10px}
.form-input:focus{border-color:var(--accent)}
.submit-btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px}
.submit-btn:hover{background:#E0431D}
.msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px}
.success-box{text-align:center;padding:10px 0}
.success-box i{font-size:40px;color:var(--green);margin-bottom:14px;display:block}
footer{background:var(--navy);color:#94a3b8;text-align:center;padding:16px;font-size:11.5px}
</style>
</head>
<body>
<header><div class="header-inner"><a href="index.html" class="logo"><span data-site-name>market</span><span>.</span></a></div></header>
<main>
<div class="card">
<div id="form-view">
<div class="card-title" data-i18n="reset_password_title">Naujas slaptažodis</div>
<div class="card-sub" data-i18n="reset_password_sub">Įveskite naują slaptažodį savo paskyrai.</div>
<input class="form-input" type="password" id="new-pass" data-i18n-placeholder="new_password" placeholder="Naujas slaptažodis">
<input class="form-input" type="password" id="new-pass2" data-i18n-placeholder="repeat_new_password" placeholder="Pakartoti naują">
<button class="submit-btn" onclick="submitReset()" data-i18n="change_btn">Pakeisti</button>
<div class="msg" id="reset-msg"></div>
</div>
<div id="success-view" style="display:none" class="success-box">
<i class="fa-solid fa-circle-check"></i>
<div class="card-title" data-i18n="password_changed">Slaptažodis pakeistas!</div>
<p style="font-size:13px;color:#64748b;margin-top:8px;margin-bottom:18px" data-i18n="reset_success_sub">Galite prisijungti su nauju slaptažodžiu.</p>
<a href="account.html" class="submit-btn" style="display:block;text-decoration:none" data-i18n="login_btn">Prisijungti</a>
</div>
</div>
</main>
<footer>&#169; 2026 market</footer>
<script>
const token = new URLSearchParams(window.location.search).get('token');

async function submitReset(){
    const pass = document.getElementById('new-pass').value;
    const pass2 = document.getElementById('new-pass2').value;
    const msg = document.getElementById('reset-msg');
    msg.style.display = 'block';

    if(!token){ msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent=t('invalid_reset_link'); return; }
    if(pass !== pass2){ msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent=t('passwords_mismatch'); return; }
    if(pass.length < 6){ msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent=t('password_too_short'); return; }

    try{
        const res = await fetch('reset_password.php', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token, password: pass})});
        const data = await res.json();
        if(data.ok){
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('success-view').style.display = 'block';
        } else {
            msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent = data.msg;
        }
    }catch(e){
        msg.style.background='#fef2f2'; msg.style.color='#dc2626'; msg.textContent = t('order_save_error');
    }
}

applyI18n();
applySiteSettings();
if(!token){
    document.getElementById('reset-msg').style.display='block';
    document.getElementById('reset-msg').style.background='#fef2f2';
    document.getElementById('reset-msg').style.color='#dc2626';
    document.getElementById('reset-msg').textContent = t('invalid_reset_link');
}
</script>
</body>
</html>
