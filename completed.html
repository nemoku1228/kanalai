<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Užsakymas patvirtintas | market</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--navy:#0B1929;--navy2:#13233A;--bg:#F7F8FA;--accent:#FF5C35;--green:#16A34A;--text:#1E293B;--text2:#64748B;--text3:#94A3B8;--border:#E7EAEE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
header{background:var(--navy2);padding:14px 0}
.header-inner{max-width:1000px;margin:0 auto;padding:0 20px}
.logo{font-family:'Sora',sans-serif;font-weight:800;font-size:22px;color:white}
.logo span{color:var(--accent)}
.lang-pills{display:flex;gap:3px}
.lang-pill{background:transparent;border:1px solid #2d3f57;color:#94a3b8;padding:2px 7px;font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.lang-pill.active{background:var(--accent);border-color:var(--accent);color:white}
.lang-flag{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.lang-code{line-height:1}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:white;border-radius:16px;max-width:520px;width:100%;overflow:hidden;border:1px solid var(--border)}
.card-top{background:var(--green);padding:32px;text-align:center;color:white}
.check-icon{width:60px;height:60px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.check-icon i{color:var(--green);font-size:26px}
.card-top h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700}
.card-top p{opacity:.9;font-size:13.5px;margin-top:6px}
.card-body{padding:24px}
.order-id-box{background:var(--bg);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.order-id-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase}
.order-id-val{font-family:'Sora',sans-serif;font-weight:700;color:var(--accent)}
.email-note{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;font-size:12.5px;color:#1d4ed8;margin-bottom:16px;display:flex;gap:8px}
.items-list{border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.item-row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
.item-row:last-child{border-bottom:none}
.totals{border-top:1px solid var(--border);padding-top:10px;margin-bottom:18px}
.total-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--text2)}
.total-row.grand{font-weight:700;font-size:15px;color:var(--text);border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.actions{display:flex;flex-direction:column;gap:10px}
.btn-track{display:block;text-align:center;background:var(--navy);color:white;padding:13px;border-radius:10px;font-weight:700;font-size:14px}
.btn-track:hover{background:var(--accent)}
.btn-back{display:block;text-align:center;background:white;color:var(--text2);padding:11px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--border)}
footer{background:var(--navy);color:#94a3b8;text-align:center;padding:16px;font-size:11.5px}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css">
<script src="i18n.js"></script>
</head>
<body>
<header>
  <div class="header-inner" style="display:flex;justify-content:space-between;align-items:center">
    <a href="index.html" class="logo"><span data-site-name>market</span><span>.</span></a>
    <div class="lang-pills" id="lang-switcher"></div>
  </div>
</header>
<main>
<div class="card">
<div class="card-top">
<div class="check-icon"><i class="fa-solid fa-check"></i></div>
<h1 data-i18n="order_received">Užsakymas gautas!</h1>
<p data-i18n="thank_you_order">Ačiū! Jūsų užsakymas sėkmingai priimtas.</p>
</div>
<div class="card-body" id="card-body"><div style="text-align:center;padding:20px;color:#94a3b8"><i class="fa-solid fa-spinner fa-spin"></i></div></div>
</div>
</main>
<footer>&#169; 2026 market</footer>
<script>
const delivLabels = { courier: t('courier_opt').split(' (')[0], post: t('post_opt').split(' (')[0], bus: t('bus_opt').split(' (')[0] };

function renderOrder(){
    const raw = localStorage.getItem('last_order');
    const el = document.getElementById('card-body');
    if(!raw){ el.innerHTML = `<p style="text-align:center;color:#94a3b8">${t('order_not_found')}</p>`; return; }
    const o = JSON.parse(raw);
    const deliveryInfo = o.delivery==='post' && o.terminal
        ? `<div class="email-note" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534"><i class="fa-solid fa-box"></i> ${t('parcel_locker_label')} <strong>${o.terminal.name}</strong></div>`
        : `<div class="email-note" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534"><i class="fa-solid fa-location-dot"></i> ${o.customer.street}, ${o.customer.city} ${o.customer.zipcode}</div>`;
    el.innerHTML = `
        <div class="order-id-box"><div><div class="order-id-label">${t('order_number')}</div><div class="order-id-val">${o.id}</div></div></div>
        <div class="email-note"><i class="fa-solid fa-envelope"></i> ${t('email_sent_to')} ${o.customer.email}</div>
        ${deliveryInfo}
        <div class="items-list">
            ${o.cart.map(i=>`<div class="item-row"><span>${i.name} <span style="color:#94a3b8">x${i.quantity}</span></span><span style="font-weight:700">${(i.price*i.quantity).toFixed(2)} €</span></div>`).join('')}
        </div>
        <div class="totals">
            <div class="total-row grand"><span>${t('total')}</span><span style="color:#FF5C35">${o.total}</span></div>
        </div>
        <div class="actions">
            <a href="account.html" class="btn-track">${t('view_in_account')}</a>
            <a href="index.html" class="btn-back">${t('return_to_shop')}</a>
        </div>`;
}

renderLangSwitcher('lang-switcher', () => renderOrder());
applyI18n();
applySiteSettings();
renderOrder();
</script>
</body>
</html>
